<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E - Sonsuz Aşk</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; background: radial-gradient(circle at center, #1a0005 0%, #000 100%); }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let w, h, heartScale;
        let particles = [];
        let time = 0;

        function setSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            heartScale = Math.min(w, h) / 22;
        }
        window.addEventListener('resize', setSize);
        setSize();

        // 3D Kalp ve E Harfi Koordinat Sistemi
        function getHeartPoint(t, phi) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            const z = 6 * Math.sin(phi) * Math.sin(t);
            return { x, y, z };
        }

        // E harfini oluşturan noktalar (3D vektörler)
        const ePoints = [
            // Dikey çizgi
            ...Array.from({length: 15}, (_, i) => ({x: -3, y: -6 + i*0.8, z: 0})),
            // Üst yatay
            ...Array.from({length: 8}, (_, i) => ({x: -3 + i*0.8, y: -6, z: 0})),
            // Orta yatay
            ...Array.from({length: 6}, (_, i) => ({x: -3 + i*0.8, y: 0, z: 0})),
            // Alt yatay
            ...Array.from({length: 8}, (_, i) => ({x: -3 + i*0.8, y: 6, z: 0}))
        ];

        class Particle {
            constructor(isLetter = false, letterPos = null) {
                this.isLetter = isLetter;
                this.letterPos = letterPos;
                this.t = Math.random() * Math.PI * 2;
                this.phi = Math.random() * Math.PI * 2;
                this.reset();
            }

            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.z = Math.random() * 100;
                this.speed = 0.04 + Math.random() * 0.04;
                this.size = this.isLetter ? 3 : Math.random() * 2 + 1;
            }

            update() {
                const angleY = time * 0.02;
                const angleX = Math.sin(time * 0.01) * 0.3;
                
                let p = this.isLetter ? {...this.letterPos} : getHeartPoint(this.t, this.phi);
                
                // 3D Döndürme Matrisi (Y ve X ekseni)
                // Y ekseni dönüşü
                let currX = p.x * Math.cos(angleY) - p.z * Math.sin(angleY);
                let currZ = p.x * Math.sin(angleY) + p.z * Math.cos(angleY);
                // X ekseni dönüşü
                let currY = p.y * Math.cos(angleX) - currZ * Math.sin(angleX);
                currZ = p.y * Math.sin(angleX) + currZ * Math.cos(angleX);

                const perspective = 600;
                const scale = perspective / (perspective + currZ);
                
                const targetX = w / 2 + currX * heartScale * scale;
                const targetY = h / 2 + currY * heartScale * scale;

                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;
                this.currentScale = scale;
            }

            draw() {
                const hue = this.isLetter ? 0 : (340 + Math.sin(time * 0.02) * 20);
                const lightness = this.isLetter ? 85 : 70;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Işıma efekti
                ctx.shadowBlur = this.isLetter ? 25 : 10;
                ctx.shadowColor = `hsla(${hue}, 100%, 60%, 1)`;
                ctx.fillStyle = `hsla(${hue}, 100%, ${lightness}%, ${this.currentScale})`;
                
                if (this.isLetter) {
                    // E harfi noktalarını elmas gibi çiz
                    ctx.rotate(Math.PI / 4);
                    ctx.fillRect(-2, -2, 4, 4);
                } else {
                    // Kalp noktalarını yıldız tozu gibi çiz
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * this.currentScale, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function init() {
            particles = [];
            // E harfini oluştur (3D)
            ePoints.forEach(p => {
                particles.push(new Particle(true, p));
            });
            // Kalbi oluştur (3D)
            const count = w < 768 ? 300 : 600;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            time++;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, w, h);

            // Derinlik sıralaması (Z-index simülasyonu için basit sıralama gerekebilir ama performans için atladık)
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Etkileşim: Tıklayınca her şeyin rengi değişsin ve savrulsun
        window.addEventListener('mousedown', () => {
            particles.forEach(p => {
                p.x += (Math.random() - 0.5) * 400;
                p.y += (Math.random() - 0.5) * 400;
            });
        });
    </script>
</body>
</html>
